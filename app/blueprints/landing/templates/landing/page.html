<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оставить заявку — МаркетПульс</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
      display: flex;
      flex-direction: column;
    }
    .page-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .form-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,.18);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
    }
    #success-msg { display: none; }
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="form-card">

    <!-- Успешная отправка -->
    <div id="success-msg" class="text-center py-3">
      <i class="bi bi-check-circle-fill text-success" style="font-size:3rem;"></i>
      <h4 class="mt-3">Заявка принята!</h4>
      <p class="text-muted">Мы свяжемся с вами в ближайшее время.</p>
    </div>

    <!-- Форма -->
    <div id="lead-form-wrap">
      <h4 class="fw-bold mb-1">Оставить заявку</h4>
      <p class="text-muted small mb-4">Заполните форму и мы свяжемся с вами</p>

      <div id="form-error" class="alert alert-danger d-none small"></div>

      <form id="lead-form" novalidate>
        <input type="hidden" id="f_utm_source"   name="utm_source">
        <input type="hidden" id="f_utm_medium"   name="utm_medium">
        <input type="hidden" id="f_utm_campaign" name="utm_campaign">
        <input type="hidden" id="f_utm_term"     name="utm_term">
        <input type="hidden" id="f_utm_content"  name="utm_content">
        <input type="hidden" name="landing_slug" value="{{ landing.slug }}">

        <div class="mb-3">
          <label class="form-label fw-semibold">Имя <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="first_name" placeholder="Иван" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Фамилия</label>
          <input type="text" class="form-control" name="last_name" placeholder="Иванов">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
          <input type="email" class="form-control" name="email" placeholder="ivan@company.ru" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Телефон</label>
          <input type="tel" class="form-control" name="phone" placeholder="+7 999 000-00-00">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Компания</label>
          <input type="text" class="form-control" name="company" placeholder="ООО «Название»">
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Должность</label>
          <input type="text" class="form-control" name="position" placeholder="Генеральный директор">
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="submit-btn">
          <span id="btn-text"><i class="bi bi-send me-1"></i>Отправить заявку</span>
          <span id="btn-spinner" class="d-none">
            <span class="spinner-border spinner-border-sm me-1"></span>Отправляем…
          </span>
        </button>
        <p class="text-muted small text-center mt-2 mb-0">
          Нажимая кнопку, вы соглашаетесь на обработку персональных данных
        </p>
      </form>
    </div>

  </div>
</div>

<footer class="py-3 text-center text-white-50 small">
  МаркетПульс &copy; 2026
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // UTM-параметры из URL → скрытые поля
  (function () {
    const params = new URLSearchParams(window.location.search);
    ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content'].forEach(function (key) {
      const val = params.get(key);
      if (val) {
        const el = document.getElementById('f_' + key);
        if (el) el.value = val;
      }
    });
  })();

  // Отправка формы
  document.getElementById('lead-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const form      = e.target;
    const btnText   = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');
    const errorBox  = document.getElementById('form-error');

    errorBox.classList.add('d-none');
    errorBox.textContent = '';

    if (!form.first_name.value.trim() || !form.email.value.trim()) {
      errorBox.textContent = 'Заполните обязательные поля: Имя и Email.';
      errorBox.classList.remove('d-none');
      return;
    }

    btnText.classList.add('d-none');
    btnSpinner.classList.remove('d-none');
    document.getElementById('submit-btn').disabled = true;

    const payload = {};
    new FormData(form).forEach(function (val, key) {
      if (val.trim()) payload[key] = val.trim();
    });

    try {
      const resp = await fetch('/api/leads', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await resp.json();
      if (resp.ok && data.ok) {
        document.getElementById('lead-form-wrap').style.display = 'none';
        document.getElementById('success-msg').style.display    = 'block';
      } else {
        throw new Error(data.error || 'Ошибка сервера');
      }
    } catch (err) {
      errorBox.textContent = err.message || 'Не удалось отправить заявку. Попробуйте позже.';
      errorBox.classList.remove('d-none');
      btnText.classList.remove('d-none');
      btnSpinner.classList.add('d-none');
      document.getElementById('submit-btn').disabled = false;
    }
  });
</script>
</body>
</html>
